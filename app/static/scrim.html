<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>스크림 관리</title>
    <link rel="stylesheet" href="/static/scrim.css" />
  </head>
  <body>
    <header class="scrim-header">
      <div>
        <p class="eyebrow">SCRIM MANAGER</p>
        <h1>스크림 관리</h1>
      </div>
      <div class="header-actions">
        <span id="scrim-backend" class="backend-badge">연결 확인 중</span>
        <span id="scrim-user-badge" class="user-badge hidden"></span>
        <button id="scrim-logout" class="ghost hidden" type="button">로그아웃</button>
      </div>
    </header>

    <main class="scrim-shell">
      <section id="auth-view" class="auth-layout">
        <article class="auth-copy">
          <p class="eyebrow">LOGIN</p>
          <h2>팀 생성과 스크림 예약을 시작하세요</h2>
          <p>회원가입은 이름, 롤 아이디, 비밀번호만 사용합니다. 로그인 세션은 기존 경매 시스템과 분리되어 관리됩니다.</p>
        </article>

        <article class="auth-card">
          <div class="auth-tabs">
            <button id="show-login" class="active" type="button">로그인</button>
            <button id="show-signup" type="button">회원가입</button>
          </div>

          <form id="login-form" class="scrim-form">
            <label>롤 아이디
              <input name="riot_id" autocomplete="username" required placeholder="닉네임#KR1" />
            </label>
            <label>비밀번호
              <input name="password" type="password" autocomplete="current-password" minlength="4" required />
            </label>
            <button class="primary" type="submit">로그인</button>
          </form>

          <form id="signup-form" class="scrim-form hidden">
            <label>이름
              <input name="name" autocomplete="name" maxlength="50" required placeholder="홍길동" />
            </label>
            <label>롤 아이디
              <input name="riot_id" autocomplete="username" maxlength="80" required placeholder="닉네임#KR1" />
            </label>
            <label>비밀번호
              <input name="password" type="password" autocomplete="new-password" minlength="4" maxlength="128" required />
            </label>
            <button class="primary" type="submit">회원가입</button>
          </form>
        </article>
      </section>

      <section id="app-view" class="dashboard hidden">
        <section class="dashboard-main">
          <article class="panel">
            <div class="panel-title">
              <span>MY TEAM</span>
              <h2>팀 생성</h2>
            </div>
            <form id="team-create-form" class="scrim-form compact">
              <label>팀명
                <input name="name" maxlength="100" required placeholder="팀 이름" />
              </label>
              <div class="inline-fields">
                <label>탑레
                  <input name="top_rank" maxlength="50" placeholder="예: Emerald II" />
                </label>
                <label>판수
                  <input name="game_count" type="number" min="0" value="0" />
                </label>
              </div>
              <button class="primary" type="submit">팀 만들기</button>
            </form>
          </article>

          <article class="panel">
            <div class="panel-title">
              <span>JOIN</span>
              <h2>팀 코드 가입</h2>
            </div>
            <form id="team-join-form" class="scrim-form compact">
              <label>초대 코드
                <input name="invite_code" required placeholder="팀 코드 입력" />
              </label>
              <button class="secondary" type="submit">가입하기</button>
            </form>
          </article>

          <article class="panel wide">
            <div class="panel-title row">
              <div>
                <span>TEAMS</span>
                <h2>팀 목록</h2>
              </div>
              <button id="refresh-teams" class="ghost" type="button">새로고침</button>
            </div>
            <div id="team-list" class="team-list"></div>
          </article>
        </section>

        <aside id="admin-panel" class="panel admin-panel hidden">
          <div class="panel-title">
            <span>ADMIN</span>
            <h2>회원 관리</h2>
          </div>
          <form id="admin-search-form" class="scrim-form compact">
            <label>회원 검색
              <input name="query" placeholder="이름 또는 롤 아이디" />
            </label>
            <button class="secondary" type="submit">검색</button>
          </form>
          <div id="admin-user-list" class="admin-user-list"></div>
        </aside>
      </section>
    </main>

    <div id="scrim-toast" class="toast"></div>
    <script src="/static/scrim.js"></script>
  </body>
</html>
